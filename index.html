<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BN Convent School — Fee Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0e1a;--surface:#111827;--card:#1a2235;--border:#1e2d45;--accent:#f59e0b;--accent2:#06b6d4;--accent3:#10b981;--danger:#ef4444;--hostel:#8b5cf6;--text:#f1f5f9;--muted:#64748b;--subtle:#1e293b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);background-image:radial-gradient(ellipse at 20% 50%,rgba(245,158,11,.08),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(6,182,212,.06),transparent 60%);position:fixed;inset:0;z-index:100;transition:opacity .4s,visibility .4s}
#login-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:44px;width:420px;max-width:95vw;box-shadow:0 40px 80px rgba(0,0,0,.5);animation:slideUp .5s ease}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.school-crest{text-align:center;margin-bottom:28px}
.school-crest .icon{font-size:44px;display:block;margin-bottom:10px}
.school-crest h1{font-family:'DM Serif Display',serif;font-size:21px;color:var(--text);line-height:1.3}
.school-crest p{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.06em;text-transform:uppercase}
.role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
.role-tab{padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.role-tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.field-group{margin-bottom:14px}
.field-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em}
.field-group input{width:100%;padding:11px 14px;background:var(--subtle);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color .2s;outline:none}
.field-group input:focus{border-color:var(--accent)}
.field-group input::placeholder{color:var(--muted)}
.login-btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#000;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;margin-top:6px}
.login-btn:hover{background:#fbbf24;transform:translateY(-1px);box-shadow:0 8px 20px rgba(245,158,11,.3)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-error{color:var(--danger);font-size:12px;text-align:center;margin-top:10px;display:none}
.login-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.8}
.login-hint strong{color:var(--accent2)}
/* APP */
#app{display:none;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-logo{font-family:'DM Serif Display',serif;font-size:18px}
.topbar-logo span{color:var(--accent)}
.role-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.role-badge.admin{background:rgba(245,158,11,.15);color:var(--accent);border:1px solid rgba(245,158,11,.3)}
.role-badge.student{background:rgba(6,182,212,.15);color:var(--accent2);border:1px solid rgba(6,182,212,.3)}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-name{font-size:12px;color:var(--muted)}
.logout-btn{padding:6px 12px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}
.nav-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;display:flex;gap:2px;overflow-x:auto}
.nav-tab{padding:13px 16px;background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{padding:24px;max-width:1400px;margin:0 auto}
.page{display:none}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* LOADER */
.loader{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;position:relative;overflow:hidden;transition:transform .2s}
.kpi-card:hover{transform:translateY(-2px)}
.kpi-card::before{content:'';position:absolute;top:0;right:0;width:70px;height:70px;border-radius:0 14px 0 70px;opacity:.1}
.kpi-card.gold::before{background:var(--accent)}.kpi-card.cyan::before{background:var(--accent2)}.kpi-card.green::before{background:var(--accent3)}.kpi-card.purple::before{background:var(--hostel)}.kpi-card.red::before{background:var(--danger)}
.kpi-icon{font-size:20px;margin-bottom:10px}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.kpi-value{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text)}
.kpi-value.money{font-family:'JetBrains Mono',monospace;font-size:19px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}
/* CHARTS */
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}
.chart-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.chart-title .dot{width:7px;height:7px;border-radius:50%}
.chart-wrap{position:relative;height:190px}
/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.table-toolbar{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-box{flex:1;min-width:180px;padding:8px 13px;background:var(--subtle);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.search-box:focus{border-color:var(--accent2)}
.filter-select{padding:8px 13px;background:var(--subtle);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer}
.hostel-toggle{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(139,92,246,.3);background:rgba(139,92,246,.1);color:var(--hostel);font-family:'DM Sans',sans-serif;transition:all .2s}
.hostel-toggle.active{background:var(--hostel);color:white;border-color:var(--hostel)}
.tcount{font-size:12px;color:var(--muted);margin-left:auto}
table{width:100%;border-collapse:collapse}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--subtle)}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid rgba(30,45,69,.5);transition:background .15s}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
.cbadge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;background:rgba(6,182,212,.12);color:var(--accent2)}
.htag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;background:rgba(139,92,246,.12);color:var(--hostel)}
.ac{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent3)}
.zc{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
.pager{padding:11px 18px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.pager-btns{display:flex;gap:6px}
.pbtn{padding:6px 12px;background:var(--subtle);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.pbtn:hover{border-color:var(--accent)}
.pbtn:disabled{opacity:.3;cursor:not-allowed}
/* SIBLINGS */
.siblings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.sib-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:transform .2s,border-color .2s}
.sib-card:hover{transform:translateY(-2px);border-color:var(--accent2)}
.sib-father{font-family:'DM Serif Display',serif;font-size:15px;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.sib-fc{font-size:11px;padding:2px 8px;border-radius:16px;background:rgba(6,182,212,.12);color:var(--accent2);font-family:'DM Sans',sans-serif}
.sib-total{font-size:12px;color:var(--muted);margin-bottom:12px}
.sib-children{display:grid;gap:7px}
.sib-child{background:var(--subtle);border-radius:9px;padding:11px;display:flex;justify-content:space-between;align-items:center}
.sib-child .cn{font-size:13px;font-weight:500}
.sib-child .cm{font-size:11px;color:var(--muted);margin-top:2px}
.sib-child .ct{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent3)}
/* HOSTEL STATS */
.hostel-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
.hstat{background:linear-gradient(135deg,rgba(139,92,246,.13),rgba(139,92,246,.04));border:1px solid rgba(139,92,246,.25);border-radius:14px;padding:18px}
.hstat .val{font-family:'JetBrains Mono',monospace;font-size:22px;color:var(--hostel);margin-bottom:3px}
.hstat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
/* STUDENT HISTORY */
.sprofile{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px}
.sph{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.spav{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:20px;color:#000;flex-shrink:0}
.spname{font-family:'DM Serif Display',serif;font-size:19px}
.spmeta{font-size:12px;color:var(--muted);margin-top:3px}
.fee-pills{display:flex;flex-wrap:wrap;gap:9px}
.pill{padding:9px 14px;border-radius:9px;min-width:95px}
.pill .pl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.pill .pv{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.pill.paid{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18)}
.pill.paid .pv{color:var(--accent3)}
.pill.hostel{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.18)}
.pill.hostel .pv{color:var(--hostel)}
.pill.total{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.18)}
.pill.total .pv{color:var(--accent);font-size:15px}
.sib-notice{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.18);border-radius:11px;padding:14px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.sib-notice .ni{font-size:18px;flex-shrink:0}
.sib-notice .nt{font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:3px}
.sib-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.chip{padding:3px 9px;background:rgba(6,182,212,.1);border-radius:5px;font-size:11px;color:var(--accent2)}
.receipt-list{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.ritem{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ritem:last-child{border-bottom:none}
.rno{font-size:11px;color:var(--muted);margin-bottom:2px}
.rtype{font-size:13px;font-weight:500}
.rdate{font-size:11px;color:var(--muted);margin-top:2px}
.ramt{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent3);font-weight:600}
.empty{text-align:center;padding:36px;color:var(--muted);font-size:13px}
/* SECTION HDR */
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stitle{font-family:'DM Serif Display',serif;font-size:20px}
.ssub{font-size:12px;color:var(--muted)}
/* FORMS */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px}
.form-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.fg{display:flex;flex-direction:column;position:relative}
.fl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.req{color:var(--danger)}
.fi{padding:10px 13px;background:var(--subtle);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.fi:focus{border-color:var(--accent2);background:rgba(6,182,212,.04)}
.fi::placeholder{color:var(--muted)}
.fi option{background:var(--card);color:var(--text)}
.fee-total-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:14px 20px;margin-top:16px}
.fee-total-bar span:first-child{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.form-btn{padding:11px 22px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.form-btn.primary{background:var(--accent3);color:#000}
.form-btn.primary:hover{background:#0ea96e;transform:translateY(-1px)}
.form-btn.primary:disabled{opacity:.5;transform:none;cursor:not-allowed}
.form-btn.blue{background:var(--accent2);color:#000}
.form-btn.blue:hover{background:#0ea5c9;transform:translateY(-1px)}
.form-btn.gold{background:var(--accent);color:#000}
.form-btn.gold:hover{background:#fbbf24;transform:translateY(-1px)}
.form-btn.secondary{background:var(--subtle);color:var(--muted);border:1px solid var(--border)}
.form-btn.secondary:hover{border-color:var(--danger);color:var(--danger)}
/* STUDENT LOOKUP CARD */
.lookup-result{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-top:20px}
.lookup-hero{background:linear-gradient(135deg,#1e3a5f,#0f2540);padding:24px 28px;display:flex;align-items:center;gap:18px}
.lookup-avatar{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:24px;color:#000;flex-shrink:0}
.lookup-name{font-family:'DM Serif Display',serif;font-size:22px;color:white;margin-bottom:3px}
.lookup-meta{font-size:12px;color:rgba(255,255,255,.6)}
.lookup-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--subtle)}
.lookup-tab{padding:11px 20px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.lookup-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.lookup-body{padding:22px}
/* REPORT CARD */
.rc-hero{background:linear-gradient(135deg,var(--card) 0%,rgba(6,182,212,.08) 100%);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:22px;text-align:center}
.rc-search-row{display:flex;gap:10px;max-width:500px;margin:18px auto 0}
.rc-search-row input{flex:1;padding:11px 14px;background:var(--subtle);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.rc-search-row input:focus{border-color:var(--accent2)}
.rc-search-row button{padding:11px 18px;background:var(--accent2);border:none;border-radius:9px;color:#000;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer}
.rc-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto}
.rc-tab{padding:10px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s}
.rc-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.rc-tab:hover{color:var(--text)}
.rc-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px}
.rc-header{background:linear-gradient(135deg,#1e3a5f,#0f2540);padding:22px 26px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px}
.rc-school{font-family:'DM Serif Display',serif;font-size:17px;color:white;margin-bottom:3px}
.rc-school-sub{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:.05em}
.rc-exam-badge{background:var(--accent);color:#000;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.05em;white-space:nowrap}
.rc-student-strip{background:rgba(6,182,212,.06);border-bottom:1px solid var(--border);padding:14px 26px;display:flex;flex-wrap:wrap;gap:20px}
.rc-sinfo{font-size:12px;color:var(--muted)}
.rc-sinfo strong{color:var(--text);font-size:13px}
.rc-table-wrap{overflow-x:auto}
.rc-table{width:100%;border-collapse:collapse;font-size:13px}
.rc-table th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);background:var(--subtle);border-bottom:1px solid var(--border)}
.rc-table th.center,.rc-table td.center{text-align:center}
.rc-table td{padding:10px 14px;border-bottom:1px solid rgba(30,45,69,.4);transition:background .15s}
.rc-table tr:hover td{background:rgba(255,255,255,.02)}
.rc-table tr:last-child td{border-bottom:none}
.rc-marks{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.rc-marks.pass{color:var(--accent3)}.rc-marks.fail{color:var(--danger)}.rc-marks.absent{color:var(--muted)}
.grade-pill{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.grade-O{background:rgba(16,185,129,.15);color:#6ee7b7}
.grade-A{background:rgba(6,182,212,.15);color:var(--accent2)}
.grade-B{background:rgba(245,158,11,.15);color:var(--accent)}
.grade-C{background:rgba(168,85,247,.15);color:#d8b4fe}
.grade-D{background:rgba(239,68,68,.15);color:#fca5a5}
.grade-F{background:rgba(239,68,68,.2);color:#f87171}
.grade-AB{background:rgba(100,116,139,.15);color:var(--muted)}
.rc-summary{background:rgba(245,158,11,.05);border-top:2px solid rgba(245,158,11,.2);padding:16px 26px;display:flex;flex-wrap:wrap;gap:18px;align-items:center}
.rc-sum-item{text-align:center}
.rc-sum-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent)}
.rc-sum-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.rc-result-badge{padding:6px 16px;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:.05em}
.rc-result-badge.pass{background:rgba(16,185,129,.15);color:var(--accent3);border:1px solid rgba(16,185,129,.3)}
.rc-result-badge.fail{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.rc-result-badge.na{background:rgba(100,116,139,.1);color:var(--muted);border:1px solid var(--border)}
.rc-na-box{text-align:center;padding:50px 30px;color:var(--muted)}
.rc-na-box .rc-na-icon{font-size:44px;margin-bottom:14px;opacity:.5}
.rc-na-box p{font-size:13px;line-height:1.8}
.rc-print-btn{display:flex;gap:10px;padding:14px 26px;border-top:1px solid var(--border);flex-wrap:wrap}
/* SUGGEST DROPDOWN */
#ff-suggest{position:absolute;left:0;right:0;top:calc(100% + 3px);background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 32px rgba(0,0,0,.5);z-index:200;max-height:300px;overflow-y:auto}
#ff-suggest:empty{display:none}
/* FEE BARS */
.fee-bars{display:grid;gap:10px;margin-bottom:24px}
.fee-bar-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.fee-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fee-bar-label{font-size:13px;font-weight:500;color:var(--text)}
.fee-bar-amount{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent)}
.fee-bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.fee-bar-fill{height:100%;border-radius:3px;transition:width 1.2s ease}
/* NOTICES */
.rc-coming-soon{background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(6,182,212,.06));border:1px solid rgba(139,92,246,.2);border-radius:14px;padding:40px;text-align:center;margin:20px 0}
.rc-coming-soon .cs-icon{font-size:52px;margin-bottom:16px}
.rc-coming-soon h3{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px;color:var(--text)}
.rc-coming-soon p{font-size:13px;color:var(--muted);max-width:420px;margin:0 auto;line-height:1.8}
/* TEST SCORES */
.score-band{height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin-top:4px}
.score-fill{height:100%;border-radius:4px;transition:width .8s ease}
@media(max-width:768px){.charts-grid{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}.main{padding:14px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="school-crest">
      <span class="icon">🏫</span>
      <h1>BN Convent Higher Secondary School</h1>
      <p>Wadrafnagar, Balrampur · Session 2025-26</p>
    </div>
    <div style="height:1px;background:var(--border);margin:20px 0"></div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('admin')" id="tab-admin">🔐 Admin</button>
      <button class="role-tab" onclick="setRole('student')" id="tab-student">👤 Student / Parent</button>
    </div>
    <div id="admin-fields">
      <div class="field-group"><label>Username</label><input id="uname" type="text" placeholder="admin" autocomplete="off"/></div>
      <div class="field-group"><label>Password</label><input id="upass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    </div>
    <div id="student-fields" style="display:none">
      <div class="field-group">
        <label>Student Full Name</label>
        <input id="student-name-input" type="text" placeholder="Enter student's full name" autocomplete="off" onkeydown="if(event.key==='Enter')document.getElementById('student-mother-input').focus()"/>
      </div>
      <div class="field-group">
        <label>Mother's Name <span style="color:var(--accent2);font-size:10px">(for verification)</span></label>
        <input id="student-mother-input" type="text" placeholder="Enter mother's name" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:-6px;margin-bottom:12px;padding:8px 10px;background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.15);border-radius:8px">
        🔒 Name + mother's name must match school records exactly
      </div>
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-hint" id="login-hint">
      <span id="student-hint" style="display:none"><br>Demo student: <strong>Himanshu Gurjar</strong> / Mother: <strong>Savitri Gurjar</strong></span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="topbar-logo">BN<span> Convent</span></div>
      <div class="role-badge" id="role-badge">Admin</div>
    </div>
    <div class="topbar-right">
      <span class="user-name" id="user-display"></span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div class="main">
    <!-- ADMIN PAGES -->
    <div class="page" id="page-dashboard"></div>
    <div class="page" id="page-students"></div>
    <div class="page" id="page-hostel"></div>
    <div class="page" id="page-siblings"></div>
    <div class="page" id="page-register"></div>
    <div class="page" id="page-admit"></div>
    <div class="page" id="page-feepay"></div>
    <div class="page" id="page-expenses"></div>
    <div class="page" id="page-tests"></div>
    <!-- STUDENT PAGES -->
    <div class="page" id="page-history"></div>
    <div class="page" id="page-report"></div>
    <div class="page" id="page-myscores"></div>
    <div class="page" id="page-payment"></div>
    <div class="page" id="page-notices"></div>
  </div>
</div>

<!-- LOAD MODULES -->
<script src="app-core.js"></script>
<script src="app-admin.js"></script>
<script src="app-student.js"></script>
</body>
</html>
