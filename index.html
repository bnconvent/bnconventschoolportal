<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BN Convent School — Fee Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ══ PASTE YOUR WEB APP URL FROM APPS SCRIPT BELOW ══════════════ */
/* See SETUP_GUIDE.html for instructions */

:root {
  --bg:#0a0e1a; --surface:#111827; --card:#1a2235; --border:#1e2d45;
  --accent:#f59e0b; --accent2:#06b6d4; --accent3:#10b981;
  --danger:#ef4444; --hostel:#8b5cf6; --text:#f1f5f9; --muted:#64748b; --subtle:#1e293b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* API auto-connected */

/* LOGIN */
#login-screen{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:var(--bg);
  background-image:radial-gradient(ellipse at 20% 50%,rgba(245,158,11,.08),transparent 60%),
                   radial-gradient(ellipse at 80% 20%,rgba(6,182,212,.06),transparent 60%);
  position:fixed;inset:0;z-index:100;transition:opacity .4s,visibility .4s;
}
#login-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.login-box{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:44px;width:420px;max-width:95vw;box-shadow:0 40px 80px rgba(0,0,0,.5);
  animation:slideUp .5s ease;
}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.school-crest{text-align:center;margin-bottom:28px}
.school-crest .icon{font-size:44px;display:block;margin-bottom:10px}
.school-crest h1{font-family:'DM Serif Display',serif;font-size:21px;color:var(--text);line-height:1.3}
.school-crest p{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.06em;text-transform:uppercase}
.login-divider{height:1px;background:var(--border);margin:22px 0}
.role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
.role-tab{
  padding:10px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:13px;cursor:pointer;transition:all .2s;
}
.role-tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
.field-group{margin-bottom:14px}
.field-group label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em}
.field-group input{
  width:100%;padding:11px 14px;background:var(--subtle);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  transition:border-color .2s;outline:none;
}
.field-group input:focus{border-color:var(--accent)}
.field-group input::placeholder{color:var(--muted)}
.login-btn{
  width:100%;padding:13px;background:var(--accent);border:none;border-radius:10px;
  color:#000;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;
  cursor:pointer;transition:all .2s;margin-top:6px;
}
.login-btn:hover{background:#fbbf24;transform:translateY(-1px);box-shadow:0 8px 20px rgba(245,158,11,.3)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-error{color:var(--danger);font-size:12px;text-align:center;margin-top:10px;display:none}
.login-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.7}
.login-hint strong{color:var(--accent2)}

/* APP */
#app{display:none;min-height:100vh}

/* TOPBAR */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 22px;height:58px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:50;
}
.topbar-logo{font-family:'DM Serif Display',serif;font-size:18px}
.topbar-logo span{color:var(--accent)}
.role-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.role-badge.admin{background:rgba(245,158,11,.15);color:var(--accent);border:1px solid rgba(245,158,11,.3)}
.role-badge.student{background:rgba(6,182,212,.15);color:var(--accent2);border:1px solid rgba(6,182,212,.3)}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-name{font-size:12px;color:var(--muted)}
.logout-btn{
  padding:6px 12px;background:transparent;border:1px solid var(--border);
  border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .2s;
}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}

/* NAV */
.nav-tabs{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 22px;display:flex;gap:2px;overflow-x:auto;
}
.nav-tab{
  padding:13px 16px;background:transparent;border:none;color:var(--muted);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;
}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MAIN */
.main{padding:24px;max-width:1400px;margin:0 auto}
.page{display:none}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* LOADER */
.loader{text-align:center;padding:60px;color:var(--muted);font-size:14px}
.spinner{
  width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:22px;position:relative;overflow:hidden;transition:transform .2s;
}
.kpi-card:hover{transform:translateY(-2px)}
.kpi-card::before{content:'';position:absolute;top:0;right:0;width:70px;height:70px;border-radius:0 14px 0 70px;opacity:.1}
.kpi-card.gold::before{background:var(--accent)}
.kpi-card.cyan::before{background:var(--accent2)}
.kpi-card.green::before{background:var(--accent3)}
.kpi-card.purple::before{background:var(--hostel)}
.kpi-icon{font-size:20px;margin-bottom:10px}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.kpi-value{font-family:'DM Serif Display',serif;font-size:26px;color:var(--text)}
.kpi-value.money{font-family:'JetBrains Mono',monospace;font-size:19px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}
.chart-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.chart-title .dot{width:7px;height:7px;border-radius:50%}
.chart-wrap{position:relative;height:190px}

/* FEE BARS */
.fee-bars{display:grid;gap:10px;margin-bottom:24px}
.fee-bar-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.fee-bar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fee-bar-label{font-size:13px;font-weight:500;color:var(--text)}
.fee-bar-amount{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent)}
.fee-bar-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.fee-bar-fill{height:100%;border-radius:3px;transition:width 1.2s ease}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.table-toolbar{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-box{
  flex:1;min-width:180px;padding:8px 13px;background:var(--subtle);
  border:1px solid var(--border);border-radius:9px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:13px;outline:none;
}
.search-box:focus{border-color:var(--accent2)}
.filter-select{
  padding:8px 13px;background:var(--subtle);border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer;
}
.hostel-toggle{
  padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid rgba(139,92,246,.3);background:rgba(139,92,246,.1);
  color:var(--hostel);font-family:'DM Sans',sans-serif;transition:all .2s;
}
.hostel-toggle.active{background:var(--hostel);color:white;border-color:var(--hostel)}
.tcount{font-size:12px;color:var(--muted);margin-left:auto}
table{width:100%;border-collapse:collapse}
th{
  padding:11px 14px;text-align:left;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
  border-bottom:1px solid var(--border);background:var(--subtle);
}
td{
  padding:11px 14px;font-size:13px;border-bottom:1px solid rgba(30,45,69,.5);
  transition:background .15s;
}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
.cbadge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;background:rgba(6,182,212,.12);color:var(--accent2)}
.htag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;background:rgba(139,92,246,.12);color:var(--hostel)}
.ac{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent3)}
.zc{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
.pager{padding:11px 18px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.pager-btns{display:flex;gap:6px}
.pbtn{
  padding:6px 12px;background:var(--subtle);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-size:12px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .2s;
}
.pbtn:hover{border-color:var(--accent)}
.pbtn:disabled{opacity:.3;cursor:not-allowed}

/* SIBLINGS */
.siblings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.sib-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:transform .2s,border-color .2s}
.sib-card:hover{transform:translateY(-2px);border-color:var(--accent2)}
.sib-father{font-family:'DM Serif Display',serif;font-size:15px;margin-bottom:3px;display:flex;align-items:center;gap:8px}
.sib-fc{font-size:11px;padding:2px 8px;border-radius:16px;background:rgba(6,182,212,.12);color:var(--accent2);font-family:'DM Sans',sans-serif}
.sib-total{font-size:12px;color:var(--muted);margin-bottom:12px}
.sib-children{display:grid;gap:7px}
.sib-child{background:var(--subtle);border-radius:9px;padding:11px;display:flex;justify-content:space-between;align-items:center}
.sib-child .cn{font-size:13px;font-weight:500}
.sib-child .cm{font-size:11px;color:var(--muted);margin-top:2px}
.sib-child .ct{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent3)}

/* HOSTEL STATS */
.hostel-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
.hstat{background:linear-gradient(135deg,rgba(139,92,246,.13),rgba(139,92,246,.04));border:1px solid rgba(139,92,246,.25);border-radius:14px;padding:18px}
.hstat .val{font-family:'JetBrains Mono',monospace;font-size:22px;color:var(--hostel);margin-bottom:3px}
.hstat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* STUDENT HISTORY VIEW */
.hist-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;margin-bottom:22px;text-align:center}
.hist-box h2{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:6px}
.hist-box p{font-size:13px;color:var(--muted);margin-bottom:18px}
.hist-row{display:flex;gap:9px;max-width:460px;margin:0 auto}
.hist-row input{flex:1;padding:11px 14px;background:var(--subtle);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.hist-row input:focus{border-color:var(--accent2)}
.sbtn{padding:11px 18px;background:var(--accent2);border:none;border-radius:9px;color:#000;font-weight:700;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer}
.hist-result{display:none}
.sprofile{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px}
.sph{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.spav{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:20px;color:#000;flex-shrink:0}
.spname{font-family:'DM Serif Display',serif;font-size:19px}
.spmeta{font-size:12px;color:var(--muted);margin-top:3px}
.fee-pills{display:flex;flex-wrap:wrap;gap:9px}
.pill{padding:9px 14px;border-radius:9px;min-width:95px}
.pill .pl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.pill .pv{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.pill.paid{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18)}
.pill.paid .pv{color:var(--accent3)}
.pill.hostel{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.18)}
.pill.hostel .pv{color:var(--hostel)}
.pill.total{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.18)}
.pill.total .pv{color:var(--accent);font-size:15px}
.sib-notice{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.18);border-radius:11px;padding:14px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.sib-notice .ni{font-size:18px;flex-shrink:0}
.sib-notice .nt{font-size:12px;font-weight:600;color:var(--accent2);margin-bottom:3px}
.sib-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.chip{padding:3px 9px;background:rgba(6,182,212,.1);border-radius:5px;font-size:11px;color:var(--accent2)}
.receipt-list{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px}
.ritem{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ritem:last-child{border-bottom:none}
.rno{font-size:11px;color:var(--muted);margin-bottom:2px}
.rtype{font-size:13px;font-weight:500}
.rdate{font-size:11px;color:var(--muted);margin-top:2px}
.ramt{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent3);font-weight:600}
.empty{text-align:center;padding:36px;color:var(--muted);font-size:13px}

/* SECTION HDR */
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stitle{font-family:'DM Serif Display',serif;font-size:20px}
.ssub{font-size:12px;color:var(--muted)}

/* REPORT CARD */
.rc-hero{background:linear-gradient(135deg,var(--card) 0%,rgba(6,182,212,.08) 100%);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:22px;text-align:center}
.rc-search-row{display:flex;gap:10px;max-width:500px;margin:18px auto 0}
.rc-search-row input{flex:1;padding:11px 14px;background:var(--subtle);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.rc-search-row input:focus{border-color:var(--accent2)}
.rc-search-row button{padding:11px 18px;background:var(--accent2);border:none;border-radius:9px;color:#000;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;font-size:14px}
.rc-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto}
.rc-tab{padding:10px 18px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s}
.rc-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.rc-tab:hover{color:var(--text)}
.rc-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:20px}
.rc-header{background:linear-gradient(135deg,#1e3a5f,#0f2540);padding:22px 26px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px}
.rc-school{font-family:'DM Serif Display',serif;font-size:17px;color:white;margin-bottom:3px}
.rc-school-sub{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:.05em}
.rc-exam-badge{background:var(--accent);color:#000;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.05em;white-space:nowrap}
.rc-student-strip{background:rgba(6,182,212,.06);border-bottom:1px solid var(--border);padding:14px 26px;display:flex;flex-wrap:wrap;gap:20px}
.rc-sinfo{font-size:12px;color:var(--muted)}
.rc-sinfo strong{color:var(--text);font-size:13px}
.rc-table-wrap{overflow-x:auto}
.rc-table{width:100%;border-collapse:collapse;font-size:13px}
.rc-table th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);background:var(--subtle);border-bottom:1px solid var(--border)}
.rc-table th.center,.rc-table td.center{text-align:center}
.rc-table td{padding:10px 14px;border-bottom:1px solid rgba(30,45,69,.4);transition:background .15s}
.rc-table tr:hover td{background:rgba(255,255,255,.02)}
.rc-table tr:last-child td{border-bottom:none}
.rc-marks{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.rc-marks.pass{color:var(--accent3)}
.rc-marks.fail{color:var(--danger)}
.rc-marks.absent{color:var(--muted)}
.rc-marks.avg{color:var(--accent)}
.grade-pill{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.grade-O{background:rgba(16,185,129,.15);color:#6ee7b7}
.grade-A{background:rgba(6,182,212,.15);color:var(--accent2)}
.grade-B{background:rgba(245,158,11,.15);color:var(--accent)}
.grade-C{background:rgba(168,85,247,.15);color:#d8b4fe}
.grade-D{background:rgba(239,68,68,.15);color:#fca5a5}
.grade-F{background:rgba(239,68,68,.2);color:#f87171}
.grade-AB{background:rgba(100,116,139,.15);color:var(--muted)}
.rc-summary{background:rgba(245,158,11,.05);border-top:2px solid rgba(245,158,11,.2);padding:16px 26px;display:flex;flex-wrap:wrap;gap:18px;align-items:center}
.rc-sum-item{text-align:center}
.rc-sum-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent)}
.rc-sum-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.rc-result-badge{padding:6px 16px;border-radius:8px;font-size:13px;font-weight:700;letter-spacing:.05em}
.rc-result-badge.pass{background:rgba(16,185,129,.15);color:var(--accent3);border:1px solid rgba(16,185,129,.3)}
.rc-result-badge.fail{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.rc-result-badge.na{background:rgba(100,116,139,.1);color:var(--muted);border:1px solid var(--border)}
.rc-na-box{text-align:center;padding:50px 30px;color:var(--muted)}
.rc-na-box .rc-na-icon{font-size:44px;margin-bottom:14px;opacity:.5}
.rc-na-box p{font-size:13px;line-height:1.8}
.rc-print-btn{display:flex;gap:10px;padding:14px 26px;border-top:1px solid var(--border);flex-wrap:wrap}
.rc-coming-soon{background:linear-gradient(135deg,rgba(139,92,246,.08),rgba(6,182,212,.06));border:1px solid rgba(139,92,246,.2);border-radius:14px;padding:40px;text-align:center;margin:20px 0}

async function api(params) {
  if (!SCRIPT_URL) {
    // Demo mode — return fake success for login
    return demoHandler(params);
  }
  const url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
  } catch(e) {
    console.error('API error:', e);
    throw e;
  }
}

ss":"6th","total":5000,"admission":5000,"tuition":0,"school":0,"hostel":0,"stationary":0,"other":0,"hasHostel":false},{"name":"Saroj","father":"Umashankar Gupta","mother":"Rekha Gupta","mobile":"","class":"7th","total":5000,"admission":0,"tuition":0,"school":5000,"hostel":0,"stationary":0,"other":0,"hasHostel":false},{"name":"Supriya Yadav","father":"Suresh Yadav","mother":"Anita Yadav","mobile":"","class":"8th","total":3000,"admission":3000,"tuition":0,"school":0,"hostel":0,"stationary":0,"other":0,"hasHostel":false},{"name":"Satyam Yadav","father":"Suresh Yadav","mother":"Anita Yadav","mobile":"","class":"6th","total":5000,"admission":0,"tuition":5000,"school":0,"hostel":0,"stationary":0,"other":0,"hasHostel":false},{"name":"Pooja","father":"Suresh Yadav","mother":"Anita Yadav","mobile":"","class":"5th","total":20000,"admission":0,"tuition":0,"school":0,"hostel":20000,"stationary":0,"other":0,"hasHostel":true},{"name":"Rishu Kurre","father":"Krishnlal Kurre","mother":"Savita Kurre","mobile":"","class":"7th","total":1000,"admission":1000,"tuition":0,"school":0,"hostel":0,"stationary":0,"other":0,"hasHostel":false},{"name":"Paridhi","father":"Krishnlal Kurre","mother":"Savita Kurre","mobile":"","class":"1st","total":500,"admission":500,"tuition":0,"school":0,"hostel":0,"stationary":0,"other":0,"hasHostel":false}];

const DEMO_SUMMARY = {totalStudents:94,hostelStudents:22,totalCollected:791000,hostelCollected:315500,admissionCollected:195500,tuitionCollected:76500,schoolCollected:203500};

function demoHandler(params) {
  const action = params.action;
  if (action === 'login') {
    if (params.role === 'admin') {
      if (params.username === 'admin' && params.password === 'school@2025')
        return {success:true,role:'admin',token:'ADMIN_DEMO_TOKEN',user:'Administrator'};
      return {success:false,error:'Invalid credentials'};
    }
    const sn = (params.studentName||'').toLowerCase().trim();
    const sm = (params.motherName||'').toLowerCase().trim();
    if (!sn || !sm) return {success:false,error:'Please enter both student name and mother name'};
    const matched = DEMO_STUDENTS.filter(s=>s.name.toLowerCase()===sn && (s.mother||'Devi').toLowerCase()===sm);
    if (!matched.length) return {success:false,error:'No student found. Name or mother name does not match records.'};
    return {success:true,role:'student',user:matched[0].name,studentQuery:matched[0].name,motherName:matched[0].mother||''};
  }
  if (action === 'getDashboard') return {summary:DEMO_SUMMARY,feeTotals:DEMO_FEE_TOTALS,monthly:DEMO_MONTHLY};
  if (action === 'getStudents') {
    let s = [...DEMO_STUDENTS];
    const q=(params.search||'').toLowerCase();
    if(q) s=s.filter(x=>x.name.toLowerCase().includes(q)||x.father.toLowerCase().includes(q));
    if(params.cls) s=s.filter(x=>x.class===params.cls);
    if(params.hostelOnly==='true') s=s.filter(x=>x.hasHostel);
    return {students:s};
  }
  if (action === 'getHostelStudents') return {students:DEMO_STUDENTS.filter(s=>s.hasHostel).map(s=>({...s,payModes:'Cash'}))};
  if (action === 'getSiblings') {
    const families = buildFamilyGroupsJS(DEMO_STUDENTS);
    return {families};
  }
  if (action === 'getFeeRegister') {
    let r=[...DEMO_RECORDS];
    const q=(params.search||'').toLowerCase();
    if(q) r=r.filter(x=>x.name.toLowerCase().includes(q)||x.rno.includes(q));
    if(params.feeType) r=r.filter(x=>x.fee_type===params.feeType);
    return {records:r,total:r.length,page:0,pageSize:25};
  }
  if (action === 'getStudentHistory') {
    const q = (params.query||'').toLowerCase().trim();
    const m = (params.mother||'').toLowerCase().trim();
    // Strict: name must match exactly, mother must match exactly
    const matched = DEMO_STUDENTS.filter(s =>
      s.name.toLowerCase() === q &&
      (s.mother||'').toLowerCase() === m
    );
    if (!matched.length) return {students:[]};
    return {students:matched.map(s=>({
      ...s,
      receipts:DEMO_RECORDS.filter(r=>r.name===s.name).map(r=>({receiptNo:r.rno,date:r.date,feeType:r.fee_type,amount:r.amount,payMode:r.pay_mode})),
      siblings:DEMO_STUDENTS.filter(x=>{
        if(x.name===s.name) return false;
        const fM = s.father && x.father && s.father.trim().toUpperCase()===x.father.trim().toUpperCase();
        const mM = s.mother && x.mother && s.mother.trim().toUpperCase()===x.mother.trim().toUpperCase();
        return fM && mM;
      }).map(x=>({name:x.name,class:x.class}))
    }))};
  }
  if (action === 'addStudent') {
    // Demo: pretend success
    return {success:true, message:'Student "'+params.studentName+'" registered successfully (demo mode — connect Google Sheets to save permanently)'};
  }
  if (action === 'addFeeEntry') {
    return {success:true, rowsAdded:1, receiptNo:params.receiptNo, message:'Fee entry saved (demo mode — connect Google Sheets to save permanently)'};
  }
  if (action === 'getLastReceiptNo') {
    const maxRno = Math.max(...DEMO_RECORDS.map(r=>parseInt(r.rno)||0), 200);
    return { lastReceiptNo: maxRno, nextReceiptNo: maxRno + 1 };
  }
  if (action === 'checkDuplicateReceipt') {
    const byRno = DEMO_RECORDS.filter(r=>r.rno===params.receiptNo);
    if (byRno.length) return {duplicate:true, type:'receiptNo', message:'Receipt #'+params.receiptNo+' already exists for: '+byRno[0].name};
    if (params.studentName && params.feeType && params.feeType!=='Other') {
      const existing = DEMO_RECORDS.filter(r=>r.name===params.studentName && r.fee_type===params.feeType);
      if (existing.length) return {duplicate:true, type:'studentFee', message:params.studentName+' already paid '+params.feeType+' (Receipt #'+existing[0].rno+')'};
    }
    return {duplicate:false};
  }
  return {error:'Unknown action in demo mode'};
}

// ═══════════════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════════════
function setRole(r) {
  CURRENT_ROLE = r;
  document.getElementById('tab-admin').classList.toggle('active', r==='admin');
  document.getElementById('tab-student').classList.toggle('active', r==='student');
  document.getElementById('admin-fields').style.display = r==='admin'?'':'none';
  document.getElementById('student-fields').style.display = r==='student'?'':'none';
  document.getElementById('login-hint').style.display = r==='admin'?'block':'none';
  const sh = document.getElementById('student-hint');
  if (sh) sh.style.display = r==='student'?'inline':'none';
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    let params;
    if (CURRENT_ROLE === 'admin') {
      params = {action:'login',role:'admin',username:document.getElementById('uname').value.trim(),password:document.getElementById('upass').value.trim()};
    } else {
      const sName = document.getElementById('student-name-input').value.trim();
      const sMother = document.getElementById('student-mother-input').value.trim();
      if (!sName || !sMother) {
        err.textContent = 'Please enter both Student Name and Mother\'s Name';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In →';
        return;
      }
      params = {action:'login',role:'student',studentName:sName,motherName:sMother};
    }
    const res = await api(params);
    if (res.success) {
      SESSION_TOKEN  = res.token || '';
      CURRENT_USER   = res.user;
      CURRENT_MOTHER = res.motherName || '';
      studentQuery   = res.studentQuery || '';
      launchApp(res.role);
    } else {
      err.textContent = res.error || 'Login failed';
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = 'Connection error: ' + e.message;
    err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Sign In →';
}

function doLogout() {
  SESSION_TOKEN = ''; CURRENT_USER = ''; CURRENT_MOTHER = ''; stuPage=0; regPage=0;
  _studentCache = null;
  if(chartMonthly){chartMonthly.destroy();chartMonthly=null;}
  if(chartDonut){chartDonut.destroy();chartDonut=null;}
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('upass').value='';
  const mi2 = document.getElementById('student-mother-input'); if(mi2) mi2.value='';
  const si2 = document.getElementById('student-name-input'); if(si2) si2.value='';
  document.getElementById('login-error').style.display='none';
}

function launchApp(role) {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display='block';
  document.getElementById('role-badge').textContent = role==='admin'?'Admin':'Student';
  document.getElementById('role-badge').className = 'role-badge '+role;
  document.getElementById('user-display').textContent = CURRENT_USER;
  buildNav(role);
  if (role==='admin') showPage('dashboard');
  else { showPage('history'); }
}

// NAV
// ═══════════════════════════════════════════════════════════════════
function buildNav(role) {
  const pages = role==='admin'
    ? [{id:'dashboard',l:'📊 Dashboard'},{id:'students',l:'👥 Students'},{id:'hostel',l:'🏠 Hostel'},{id:'siblings',l:'👨‍👧‍👦 Siblings'},{id:'register',l:'📋 Fee Register'},{id:'admit',l:'➕ Admit Student'},{id:'feepay',l:'💳 Collect Fee'}]
    : [{id:'history',l:'📄 Fee History'},{id:'report',l:'📋 Report Card'},{id:'payment',l:'💳 Pay Fee Online'},{id:'notices',l:'📢 Notices'}];
  document.getElementById('nav-tabs').innerHTML = pages.map(p=>
    `<button class="nav-tab" onclick="showPage('${p.id}')" id="nav-${p.id}">${p.l}</button>`
  ).join('');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id)?.classList.add('active');
  document.getElementById('nav-'+id)?.classList.add('active');
  if(id==='dashboard') loadDashboard();
  if(id==='students')  loadStudents();
  if(id==='hostel')    loadHostel();
  if(id==='siblings')  loadSiblings();
  if(id==='register')  loadRegister();
  if(id==='admit')     loadAdmitPage();
  if(id==='feepay')    loadFeePayPage();
  if(id==='history')   renderHistoryPage();
  if(id==='report')    renderReportPage();
  if(id==='payment')   renderPaymentPage();
  if(id==='notices')   renderNoticesPage();
}

async function loadDashboard() {
  const el = document.getElementById('page-dashboard');
  el.innerHTML = loader();
  try {
    const d = await api({action:'getDashboard',token:SESSION_TOKEN});
    renderDashboard(d);
  } catch(e) { el.innerHTML = errorBox(e.message); }
}

function renderStudentsPage() {
  document.getElementById('page-students').innerHTML = `
  <div class="table-wrap">
    <div class="table-toolbar">
      <input class="search-box" id="stu-search" placeholder="Search by name or father…" oninput="debounce(loadStudents,400)()"/>
      <select class="filter-select" id="stu-class" onchange="loadStudents()">

      </select>
      <button class="hostel-toggle ${hostelOnly?'active':''}" id="hostel-tog" onclick="toggleHostel()">🏠 Hostel Only</button>
      <span class="tcount" id="stu-count"></span>
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>#</th><th>Student Name</th><th>Father's Name</th><th>Class</th><th>Admission</th><th>Tuition</th><th>School</th><th>Hostel</th><th>Other</th><th>Total Paid</th></tr></thead>
      <tbody id="stu-tbody"></tbody>
    </table></div>

        <button class="pbtn" onclick="stuPage++;loadStudents()" id="stu-next">Next →</button>
      </div>
    </div>
  </div>`;

async function loadStudents() {
  if (!document.getElementById('stu-tbody')) renderStudentsPage();
  const search = document.getElementById('stu-search')?.value||'';
  const cls    = document.getElementById('stu-class')?.value||'';
  try {
    const d = await api({action:'getStudents',token:SESSION_TOKEN,search,cls,hostelOnly:hostelOnly?'true':'false',page:stuPage});
    stuData = d.students || [];
    if (!allClasses.length) {
      allClasses = [...new Set(stuData.map(s=>s.class))].sort(classOrd);
      renderStudentsPage();
    }
    const start = stuPage*PAGE_SZ, slice = stuData.slice(start,start+PAGE_SZ);
    document.getElementById('stu-count').textContent = stuData.length+' student(s)';
    document.getElementById('stu-pinfo').textContent = `Showing ${start+1}–${Math.min(start+PAGE_SZ,stuData.length)} of ${stuData.length}`;
    document.getElementById('stu-prev').disabled = stuPage===0;
    document.getElementById('stu-next').disabled = start+PAGE_SZ>=stuData.length;
    document.getElementById('stu-tbody').innerHTML = slice.map((s,i)=>`<tr>
      <td style="color:var(--muted);font-size:11px">${start+i+1}</td>
      <td><div style="font-weight:500">${s.name}</div>${s.hasHostel?'<div class="htag" style="margin-top:3px">🏠 Hostel</div>':''}</td>
      <td style="color:var(--muted)">${s.father}</td>
      <td><span class="cbadge">${s.class}</span></td>
      <td class="${s.admission>0?'ac':'zc'}">${s.admission>0?'₹'+fmt(s.admission):'—'}</td>
      <td class="${s.tuition>0?'ac':'zc'}">${s.tuition>0?'₹'+fmt(s.tuition):'—'}</td>
      <td class="${s.school>0?'ac':'zc'}">${s.school>0?'₹'+fmt(s.school):'—'}</td>
      <td class="${s.hostel>0?'ac':'zc'}" style="${s.hostel>0?'color:var(--hostel)':''}">${s.hostel>0?'₹'+fmt(s.hostel):'—'}</td>
      <td class="${s.other>0?'ac':'zc'}">${s.other>0?'₹'+fmt(s.other):'—'}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--accent)">₹${fmt(s.total)}</td>
    </tr>`).join('');
  } catch(e) { document.getElementById('page-students').innerHTML=errorBox(e.message); }
}

function toggleHostel() {
  hostelOnly=!hostelOnly; stuPage=0;
  document.getElementById('hostel-tog')?.classList.toggle('active',hostelOnly);
  loadStudents();
}

async function loadHostel() {
  const el = document.getElementById('page-hostel');
  el.innerHTML = loader();
  try {
    const d = await api({action:'getHostelStudents',token:SESSION_TOKEN});
    const ss = d.students || [];
    const totalH = ss.reduce((a,s)=>a+s.hostel,0);
    const avg = ss.length ? totalH/ss.length : 0;
    const clsDist = {};
    ss.forEach(s=>{clsDist[s.class]=(clsDist[s.class]||0)+1;});
    const topCls = Object.entries(clsDist).sort((a,b)=>b[1]-a[1])[0];

    el.innerHTML = `
    <div class="hostel-stats">
      <div class="hstat"><div class="val">${ss.length}</div><div class="lbl">Total Hostel Students</div></div>
      <div class="hstat"><div class="val">₹${fmt(totalH)}</div><div class="lbl">Total Hostel Collected</div></div>
      <div class="hstat"><div class="val">₹${fmt(Math.round(avg))}</div><div class="lbl">Average per Student</div></div>
      <div class="hstat"><div class="val">${topCls?topCls[0]:'—'}</div><div class="lbl">Top Class</div></div>
    </div>
    <div class="shdr"><div><div class="stitle">Hostel Students</div><div class="ssub">All ${ss.length} students paying hostel fee</div></div></div>
    <div class="table-wrap">
      <div style="overflow-x:auto"><table>
        <thead><tr><th>#</th><th>Student Name</th><th>Father</th><th>Class</th><th>Hostel Fee</th><th>School Fee</th><th>Total Paid</th><th>Pay Mode</th></tr></thead>
        <tbody>${ss.map((s,i)=>`<tr>
          <td style="color:var(--muted);font-size:11px">${i+1}</td>
          <td style="font-weight:500">${s.name}</td>
          <td style="color:var(--muted)">${s.father}</td>

  try {

async function loadStudentHistory(name, mother) {
  const el = document.getElementById('hist-result');

  try {
    const d = await api({action:'getStudentHistory', query:name, mother:mother});

}

  const m = CURRENT_MOTHER;

  const el = document.getElementById('hist-result');

// ── Shared student profile renderer ──────────────────────────────
function renderStudentProfileHTML(el, students) {
  let html = '';
  students.forEach(s => {
    const initials = s.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    // Student info card
    html += `
    <div class="sprofile">
      <div class="sph">
        <div class="spav">${initials}</div>
        <div>
          <div class="spname">${s.name}</div>
          <div class="spmeta">
            Father: ${s.father||'—'} &nbsp;·&nbsp;
            Mother: ${s.mother||'—'} &nbsp;·&nbsp;
            Class ${s.class}
            ${s.hasHostel?' &nbsp;·&nbsp; 🏠 Hostel':''}
            ${s.mobile?` &nbsp;·&nbsp; 📱 ${s.mobile}`:''}
          </div>
        </div>
      </div>`;

    // siblings notice
    if (s.siblings && s.siblings.length > 0) {
      html += `<div class="sib-notice" style="margin:0 0 14px">
        <div class="ni">👨‍👧‍👦</div>
        <div>
          <div class="nt">Sibling(s) found — Father: ${s.father}${s.mother?' · Mother: '+s.mother:''}</div>
          <div class="sib-chips" style="margin-top:6px">${s.siblings.map(x=>`<span class="chip">${x.name} · Class ${x.class}</span>`).join('')}</div>
        </div>
      </div>`;
    }

    html += `
      <div class="fee-pills">
        ${s.admission>0?`<div class="pill paid"><div class="pl">Admission</div><div class="pv">₹${fmt(s.admission)}</div></div>`:''}
        ${s.tuition>0?`<div class="pill paid"><div class="pl">Tuition</div><div class="pv">₹${fmt(s.tuition)}</div></div>`:''}
        ${s.school>0?`<div class="pill paid"><div class="pl">School Fee</div><div class="pv">₹${fmt(s.school)}</div></div>`:''}
        ${s.hostel>0?`<div class="pill hostel"><div class="pl">Hostel</div><div class="pv">₹${fmt(s.hostel)}</div></div>`:''}
        ${s.stationary>0?`<div class="pill paid"><div class="pl">Stationary</div><div class="pv">₹${fmt(s.stationary)}</div></div>`:''}
        <div class="pill total"><div class="pl">Total Paid</div><div class="pv">₹${fmt(s.total)}</div></div>
      </div>
    </div>
    <div class="receipt-list">
      ${(s.receipts||[]).length===0
        ? '<div class="empty">No payment records found.</div>'
        : (s.receipts||[]).map(r=>`<div class="ritem">
            <div>
              <div class="rno">Receipt #${r.receiptNo} · ${r.payMode}</div>
              <div class="rtype">${r.feeType}</div>
              <div class="rdate">${r.date}</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <div class="ramt">₹${fmt(r.amount)}</div>
              <button onclick="printReceipt(${JSON.stringify(r).replace(/"/g,'&quot;')},${JSON.stringify(s).replace(/"/g,'&quot;')})"
                style="padding:5px 10px;background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);border-radius:7px;color:var(--accent2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">🖨 Print</button>
            </div>
          </div>`).join('')}
    </div>
    <div style="margin-bottom:20px"></div>`;
  });
  el.innerHTML = html;
}

async function submitAdmit() {

  const father = document.getElementById('ad-father').value.trim();
  const cls    = document.getElementById('ad-class').value;
  const date   = document.getElementById('ad-date').value;

  if (!name)  { showFormMsg('admit-msg','error','Please enter Student Name'); return; }
  if (!father){ showFormMsg('admit-msg','error','Please enter Father\'s Name'); return; }
  if (!cls)   { showFormMsg('admit-msg','error','Please select Class'); return; }
  if (!date)  { showFormMsg('admit-msg','error','Please select Admission Date'); return; }

  const btn = document.querySelector('#admit-card .form-btn.primary');
  btn.disabled=true; btn.textContent='Registering…';

  try {
    const d = await api({
      action:'addStudent', token:SESSION_TOKEN,
      studentName:name, fatherName:father, motherName:document.getElementById('ad-mother').value.trim(),
      class:cls, dob:document.getElementById('ad-dob').value,
      gender:document.getElementById('ad-gender').value,

      admissionDate:date, hostel:document.getElementById('ad-hostel').value,

      showFormMsg('admit-msg','error','❌ '+(d.error||'Registration failed'));

  } catch(e) { showFormMsg('admit-msg','error','❌ '+e.message); }
  btn.disabled=false; btn.textContent='✅ Register Student';
}

function clearAdmit() {
  ['ad-name','ad-father','ad-mother','ad-mobile','ad-address','ad-notes'].forEach(id=>document.getElementById(id).value='');

function suggestStudents(q) {
  const box = document.getElementById('ff-suggest');
  if (!box) return;
  if (!q || q.length < 1) { box.innerHTML=''; return; }

  // Use live cache if available, else DEMO_STUDENTS
  const pool = _studentCache || DEMO_STUDENTS;
  const ql = q.toLowerCase();
  const matches = pool.filter(s =>
    s.name.toLowerCase().includes(ql) ||
    (s.father||'').toLowerCase().includes(ql)
  ).slice(0, 8);

  if (!matches.length) { box.innerHTML=''; return; }

  const feeIcons = {'admission':'📝','tuition':'📚','school':'🏫','hostel':'🏠'};

  box.innerHTML = matches.map(s => {
    // Show which fees already paid as small tags
    const paidTags = Object.entries(feeIcons)

      .map(([k,icon]) => `<span style="background:rgba(16,185,129,.1);color:#6ee7b7;padding:1px 5px;border-radius:3px;font-size:10px">${icon} ${k.charAt(0).toUpperCase()+k.slice(1)} ✓</span>`)

function buildFamilyGroupsJS(students) {
  const groups = {};

  students.forEach(s => {
    // Normalize names to Uppercase for consistent matching
    const fName = (s.father || '').trim().toUpperCase();
    const mName = (s.mother || '').trim().toUpperCase();

    // CRITICAL: Only group if BOTH parents are known. 
    // This prevents grouping all students who have blank fields.
    if (!fName || !mName) return;

    // Create a Strict Unique Key: "FATHER + MOTHER"
    const familyKey = fName + " | " + mName;

    if (!groups[familyKey]) {
      groups[familyKey] = [];
    }
    groups[familyKey].push(s);
  });

  // Filter for real siblings (more than 1 child) and format for the UI
  return Object.values(groups)
    .filter(ss => ss.length > 1)
    .sort((a, b) => b.length - a.length)
    .map(children => {
      const normalizedChildren = children.map(c => ({
        ...c,
        total: Number(c.total) || 0,
        totalPaid: Number(c.totalPaid || c.total) || 0,
        hasHostel: !!c.hasHostel
      }));

      return {
        father: children[0].father || '—',
        mother: children[0].mother || '',
        count: children.length,
        familyTotal: normalizedChildren.reduce((a, c) => a + c.total, 0),
        children: normalizedChildren
      };
    });
}

async function submitFeeEntry() {
  const name   = document.getElementById('ff-name').value.trim();
  const rno    = document.getElementById('ff-rno').value.trim();
  const date   = document.getElementById('ff-date').value;
  const cls    = document.getElementById('ff-class').value;
  const feeIds = ['ff-admission','ff-tuition','ff-school','ff-hostel','ff-stationary','ff-other'];
  const feeKeys= ['admission','tuition','school','hostel','stationary','other'];
  const feeNames=['Admission Fee','Tuition Fee','School Fee','Hostel Fee','Stationary Charge','Other'];
  const total  = feeIds.reduce((a,id)=>a+(parseFloat(document.getElementById(id)?.value)||0),0);

  if (!rno)    { showFormMsg('feepay-msg','error','Please enter Receipt Number'); return; }
  if (!date)   { showFormMsg('feepay-msg','error','Please select Date'); return; }
  if (!name)   { showFormMsg('feepay-msg','error','Please enter Student Name'); return; }
  if (total<=0){ showFormMsg('feepay-msg','error','Please enter at least one fee amount'); return; }

  const btn=document.querySelector('#fee-form-card .form-btn.primary');
  btn.disabled=true; btn.textContent='Checking duplicates…';

  // ── Pre-save duplicate check ──────────────────────────────────
  try {
    // 1. Check receipt no duplicate
    const rnoCheck = await api({action:'checkDuplicateReceipt', token:SESSION_TOKEN, receiptNo:rno});
    if (rnoCheck.duplicate && rnoCheck.type==='receiptNo') {
      const proceed = confirm('⚠️ Duplicate Receipt No!\n\n'+rnoCheck.message+'\n\nDo you want to proceed anyway?');
      if (!proceed) { btn.disabled=false; btn.textContent='💾 Save & Generate Receipt'; return; }
    }
    // 2. Check each fee type for duplicate payment
    const feeAmounts = feeIds.map((id,i)=>({name:feeNames[i],val:parseFloat(document.getElementById(id)?.value)||0}));
    const paidFees   = feeAmounts.filter(f=>f.val>0 && f.name!=='Other');
    const dupWarnings = [];
    for (const fee of paidFees) {
      const fc = await api({action:'checkDuplicateReceipt', token:SESSION_TOKEN, receiptNo:'__skip__', studentName:name, feeType:fee.name});
      if (fc.duplicate && fc.type==='studentFee') dupWarnings.push(fc.message);
    }
    if (dupWarnings.length > 0) {
      const proceed = confirm('⚠️ Possible Duplicate Payment!\n\n'+dupWarnings.join('\n')+'\n\nThis student may have already paid these fees.\nDo you want to save anyway?');
      if (!proceed) { btn.disabled=false; btn.textContent='💾 Save & Generate Receipt'; return; }
    }
  } catch(e) { /* if check fails, allow save to continue */ }

  btn.textContent='Saving…';

  const payload = {
    action:'addFeeEntry', token:SESSION_TOKEN,
    receiptNo:rno, date, studentName:name,
    fatherName:document.getElementById('ff-father').value.trim(),
    class:cls,
    mobile:document.getElementById('ff-mobile').value.trim(),
    payMode:document.getElementById('ff-paymode').value,
    receivedBy:document.getElementById('ff-recvby').value,
    inWords:document.getElementById('ff-inwords').value.trim(),
    remarks:document.getElementById('ff-remarks').value.trim(),
  };
  feeKeys.forEach((k,i)=>payload[k]=(parseFloat(document.getElementById(feeIds[i])?.value)||0));

  try {
    const d = await api(payload);
    if (d.success||d.rowsAdded) {
      showFormMsg('feepay-msg','success','✅ Fee saved! Receipt #'+rno+' generated.');
      feeFormReceipt.data = {...payload, total};
      document.getElementById('ff-print-btn').style.display='inline-flex';
    } else {
      showFormMsg('feepay-msg','error','❌ '+(d.error||'Save failed'));
    }
  } catch(e){ showFormMsg('feepay-msg','error','❌ '+e.message); }
  btn.disabled=false; btn.textContent='💾 Save & Generate Receipt';
}

  ['ff-admission','ff-tuition','ff-school','ff-hostel','ff-stationary','ff-other'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });

// Mock marks generator (realistic — will be replaced by live API data)
function mockMarks(studentName, cls, examId, subjName, maxMarks) {
  // Deterministic fake marks based on name + subject + exam
  const seed = (studentName+subjName+examId+cls).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const rng = (seed*9301+49297)%233280/233280;
  const rng2 = ((seed*6364+1442695)%233280)/233280;
  const absent = rng2 > 0.92; // 8% absent
  if (absent) return null; // null = absent
  const pct = 0.38 + rng * 0.57; // range 38%–95%
  return Math.round(maxMarks * pct);
}

function getClassGroup(cls) {
  const n = cls.replace(/[^0-9]/g,'');
  if (!n) return 'primary'; // Nursery/LKG/UKG
  const num = parseInt(n);
  if (num <= 5)  return 'primary';
  if (num <= 8)  return 'middle';
  if (num <= 10) return 'high';
  return 'higher';
}

function getGrade(marks, max) {
  if (marks === null) return 'AB';
  const pct = (marks / max) * 100;
  if (pct >= 91) return 'O';
  if (pct >= 71) return 'A';
  if (pct >= 56) return 'B';
  if (pct >= 41) return 'C';
  if (pct >= 33) return 'D';
  return 'F';
}

function getGradeLabel(g) {
  return {O:'Outstanding',A:'Excellent',B:'Good',C:'Average',D:'Satisfactory',F:'Needs Improvement',AB:'Absent'}[g]||'';
}

async function loadPaymentPage() {

      <div style="font-size:11px;color:var(--muted);line-height:1.8;max-width:420px;margin:0 auto;padding:12px;background:rgba(245,158,11,.05);border:1px solid rgba(245,158,11,.15);border-radius:8px">

// UTILS
// ═══════════════════════════════════════════════════════════════════
function fmt(n){return Number(n).toLocaleString('en-IN')}
function loader(){return `<div class="loader"><div class="spinner"></div>Loading…</div>`}
function errorBox(msg){return `<div class="loader" style="color:var(--danger)">⚠️ ${msg}</div>`}
function kpi(icon,label,value,sub,cls,money){
  return `<div class="kpi-card ${cls}"><div class="kpi-icon">${icon}</div><div class="kpi-label">${label}</div><div class="kpi-value ${money?'money':''}">${value}</div><div class="kpi-sub">${sub}</div></div>`;
}
function feeColor(k){return {'Hostel Fee':'#8b5cf6','School Fee':'#10b981','Admission Fee':'#f59e0b','Tuition Fee':'#06b6d4'}[k]||'#94a3b8'}
function classOrd(a,b){const o={'Nursery':0,'LKG':1,'UKG':2,'1st':3,'2nd':4,'3rd':5,'4th':6,'5th':7,'6th':8,'7th':9,'8th':10,'9th':11,'10th':12,'11th':13,'12th':14};return (o[a]??99)-(o[b]??99)}

const timers={};
function debounce(fn,ms){return function(){clearTimeout(timers[fn]);timers[fn]=setTimeout(fn,ms);}}
